<!DOCTYPE html>
<html>
<body>
  <h2>Puter AI Test</h2>
  <div id="output"></div>
  <script src="https://js.puter.com/v2/"></script>
  <script>
    const out = document.getElementById('output');
    out.innerHTML = 'Cargando...';

    puter.ai.chat('Hola, dime algo interesante en una frase.', { model: 'anthropic/claude-sonnet-4-6' })
      .then(r => {
        out.innerHTML = '<strong>Respuesta:</strong><br>' + r.message.content[0].text;
      })
      .catch(e => {
        out.innerHTML = '<strong>Error:</strong> ' + e.message;
      });
  </script>
</body>
</html>
